{% extends "layouts/auth_base.html" %}

{% block title %}{{ title }}{% endblock %}

{% block content %}
<div class="auth-card">
    <div class="auth-card-header">
        <div class="auth-icon auth-icon-warning">
            <i class="fas fa-shield-alt"></i>
        </div>
        <h1 class="auth-title">Admin Login</h1>
        <p class="auth-subtitle">LLM Proxy Server Administration</p>
    </div>

    <form method="POST" action="/admin/login">
        <div class="form-group">
            <label for="username" class="form-label">Username</label>
            <input type="text" class="form-control" id="username" name="username" required autocomplete="username">
        </div>

        <div class="form-group">
            <label for="password" class="form-label">Password</label>
            <input type="password" class="form-control" id="password" name="password" required autocomplete="current-password">
        </div>

        <div class="form-group">
            <button type="submit" class="btn btn-primary w-100">
                <i class="fas fa-shield-alt me-2"></i>Login as Admin
            </button>
        </div>
    </form>

    <div class="auth-links">
        <a href="/" class="text-muted">← Back to Home</a>
    </div>
</div>
{% endblock %}
