{% extends "layouts/auth_base.html" %}

{% block title %}{{ title }}{% endblock %}

{% block content %}
<div class="auth-card">
    <div class="auth-card-header">
        <div class="auth-icon">
            <i class="fas fa-user-plus"></i>
        </div>
        <h1 class="auth-title">Sign Up</h1>
        <p class="auth-subtitle">LLM Proxy Server</p>
    </div>

    <form id="signupForm" novalidate>
        <div class="form-group">
            <label for="username" class="form-label">Username</label>
            <input type="text" class="form-control" id="username" name="username" autocomplete="username">
            <div class="form-text">At least 3 characters</div>
            <div class="invalid-feedback" id="username-error"></div>
        </div>

        <div class="form-group">
            <label for="email" class="form-label">Email</label>
            <input type="email" class="form-control" id="email" name="email" autocomplete="email">
            <div class="invalid-feedback" id="email-error"></div>
        </div>

        <div class="form-group">
            <label for="password" class="form-label">Password</label>
            <input type="password" class="form-control" id="password" name="password" autocomplete="new-password">
            <div class="form-text">At least 6 characters</div>
            <div class="invalid-feedback" id="password-error"></div>
        </div>

        <div class="form-group">
            <label for="confirmPassword" class="form-label">Confirm Password</label>
            <input type="password" class="form-control" id="confirmPassword" name="confirmPassword" autocomplete="new-password">
            <div class="invalid-feedback" id="confirmPassword-error"></div>
        </div>

        <div class="form-group">
            <button type="submit" class="btn btn-primary w-100">
                <i class="fas fa-user-plus me-2"></i>Sign Up
            </button>
        </div>
    </form>

    <div class="auth-links">
        <small class="text-muted">
            Already have an account? <a href="/login">Login here</a>
        </small>
    </div>
    <div class="auth-links">
        <a href="/" class="text-muted">← Back to Home</a>
    </div>
</div>
{% endblock %}

{% block extra_js %}
<script src="/static/js/features/auth/signup.js"></script>
{% endblock %}
