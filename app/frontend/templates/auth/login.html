{% extends "layouts/auth_base.html" %}

{% block title %}{{ title }}{% endblock %}

{% block content %}
<div class="auth-card">
    <div class="auth-card-header">
        <div class="auth-icon">
            <i class="fas fa-sign-in-alt"></i>
        </div>
        <h1 class="auth-title">Login</h1>
        <p class="auth-subtitle">LLM Proxy Server</p>
    </div>

    <!-- Error Alert -->
    <div id="errorAlert" class="alert alert-danger d-none mb-4" role="alert">
        <i class="fas fa-exclamation-triangle me-2"></i>
        <span id="errorMessage"></span>
    </div>

    <form id="loginForm" novalidate>
        <div class="form-group">
            <label for="username" class="form-label">Username</label>
            <input type="text" class="form-control" id="username" name="username" required autocomplete="username">
        </div>

        <div class="form-group">
            <label for="password" class="form-label">Password</label>
            <input type="password" class="form-control" id="password" name="password" required autocomplete="current-password">
        </div>

        <div class="form-group">
            <button type="submit" class="btn btn-primary w-100">
                <i class="fas fa-sign-in-alt me-2"></i>Login
            </button>
        </div>
    </form>

    <div class="auth-divider"><span>or</span></div>

    <div class="oauth-buttons">
        <button id="zohoLoginBtn" class="btn btn-outline-primary w-100">
            <i class="fab fa-brands fa-z me-2"></i>Continue with ZOHO
        </button>
    </div>

    <div class="auth-links">
        <small class="text-muted">
            Don't have an account? <a href="/signup">Sign up here</a>
        </small>
    </div>
    <div class="auth-links">
        <a href="/" class="text-muted">← Back to Home</a>
    </div>
</div>
{% endblock %}

{% block extra_js %}
<script src="/static/js/features/auth/login.js"></script>
{% endblock %}
